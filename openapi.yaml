components:
  schemas:
    http.LiveResponse:
      properties:
        status:
          type: string
      required:
        - status
      type: object
info:
  contact:
    email: info@alkem.io
    name: Alkemio Foundation
    url: https://alkem.io
  description: |
    Continuous file-backup worker for Alkemio. Consumes the file-service outbox
    and fans out to N content-addressed backup targets. This HTTP surface is
    operational only (liveness, readiness, metrics) — there are no public,
    authorization-guarded endpoints.
  license:
    name: EUPL-1.2
    url: https://opensource.org/licenses/EUPL-1.2
  title: Alkemio File Backup Service
  version: 0.1.0
openapi: 3.1.1
paths:
  /live:
    get:
      operationId: http.ServeLive
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/http.LiveResponse'
          description: OK
      summary: |-
        ServeLive is the K8s liveness handler: returns 200 unconditionally so the
        probe reflects process-alive only, independent of DB/target availability.
